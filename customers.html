<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة العملاء - شركة كنز الماجد</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C; --gold-light: #E8C97A; --gold-dim: rgba(201,168,76,0.15);
    --dark: #0D0D0D; --dark2: #141414; --dark3: #1C1C1C; --dark4: #242424;
    --surface: #1A1A1A; --border: rgba(201,168,76,0.2); --border-hover: rgba(201,168,76,0.5);
    --text: #F0EAD6; --text-muted: #8A8070; --text-dim: #5A5248;
    --success: #4CAF7A; --danger: #C94C4C;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 8px 32px rgba(0,0,0,0.6); --shadow-gold: 0 4px 20px rgba(201,168,76,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Tajawal', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; direction: rtl; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,168,76,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(201,168,76,0.04) 0%, transparent 60%);
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* ── Header ── */
  header {
    background: linear-gradient(180deg, rgba(201,168,76,0.08) 0%, transparent 100%);
    border-bottom: 1px solid var(--border); padding: 28px 0 24px;
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px);
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 46px; height: 46px; background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 22px; box-shadow: 0 4px 16px rgba(201,168,76,0.3);
  }
  .logo-text h1 { font-size: 20px; font-weight: 800; color: var(--gold-light); line-height: 1.2; }
  .logo-text p { font-size: 12px; color: var(--text-muted); }
  .header-stats { display: flex; gap: 12px; }
  .stat-chip { background: var(--dark3); border: 1px solid var(--border); border-radius: 40px; padding: 8px 18px; text-align: center; }
  .stat-chip .num { font-size: 20px; font-weight: 800; color: var(--gold); line-height: 1; }
  .stat-chip .lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; background: var(--dark3); border: 1px solid var(--border); border-radius: 14px; padding: 5px; margin: 28px 0 32px; }
  .tab {
    flex: 1; padding: 11px 20px; border-radius: 10px; border: none; background: transparent;
    color: var(--text-muted); font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.25s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .tab.active { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--dark); box-shadow: 0 4px 16px rgba(201,168,76,0.3); }
  .tab:not(.active):hover { background: var(--dark4); color: var(--text); }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Card ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 32px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; right: 0; width: 200px; height: 200px; background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%); pointer-events: none; }
  .card-title { font-size: 18px; font-weight: 700; color: var(--gold-light); margin-bottom: 28px; display: flex; align-items: center; gap: 10px; }

  /* ── Form ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.3px; }
  input[type="text"], input[type="tel"], select, textarea {
    background: var(--dark3); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px 16px; color: var(--text); font-family: 'Tajawal', sans-serif;
    font-size: 15px; font-weight: 500; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%; direction: rtl;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
  input::placeholder, textarea::placeholder { color: var(--text-dim); }
  select option { background: var(--dark3); }
  textarea { resize: vertical; min-height: 90px; }

  /* ── Source ── */
  .source-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .source-option { display: none; }
  .source-label {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 14px 10px; background: var(--dark3); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .source-label .src-icon { font-size: 24px; }
  .source-label .src-name { font-size: 12px; font-weight: 600; color: var(--text-muted); }
  .source-option:checked + .source-label { border-color: var(--gold); background: var(--gold-dim); box-shadow: var(--shadow-gold); }
  .source-option:checked + .source-label .src-name { color: var(--gold-light); }
  .source-label:hover { border-color: var(--border-hover); background: var(--dark4); }

  /* ── Branches ── */
  .branch-list { display: flex; flex-direction: column; gap: 10px; }
  .branch-row { display: flex; gap: 10px; align-items: center; }
  .branch-row input { flex: 1; }
  .btn-icon {
    width: 40px; height: 40px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--dark4); color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s; flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--danger); color: var(--danger); background: rgba(201,76,76,0.1); }
  .add-branch-btn {
    width: 100%; padding: 10px; border-radius: 8px; border: 1.5px dashed var(--border);
    background: transparent; color: var(--text-dim); font-family: 'Tajawal', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px;
  }
  .add-branch-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

  /* ── Buttons ── */
  .btn {
    padding: 12px 24px; border-radius: var(--radius-sm); border: none;
    font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--dark); box-shadow: 0 4px 16px rgba(201,168,76,0.25); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(201,168,76,0.35); }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-muted); }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-pdf { background: rgba(76,175,122,0.12); border: 1.5px solid rgba(76,175,122,0.3); color: var(--success); }
  .btn-pdf:hover { background: rgba(76,175,122,0.22); transform: translateY(-1px); }
  .form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border); }

  /* ── Search / List Toolbar ── */
  .search-bar { display: flex; gap: 12px; margin-bottom: 20px; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input { padding-right: 46px; width: 100%; }
  .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 18px; pointer-events: none; }
  .filter-select { width: 180px; }
  .list-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .list-count { font-size: 13px; color: var(--text-dim); }

  /* ── Customer Cards ── */
  .customers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
  .customer-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 24px; transition: all 0.25s; cursor: pointer; position: relative; overflow: hidden;
  }
  .customer-card::after {
    content: ''; position: absolute; top: 0; right: 0; width: 4px; height: 100%;
    background: linear-gradient(180deg, var(--gold), transparent); opacity: 0; transition: opacity 0.2s;
  }
  .customer-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4), var(--shadow-gold); }
  .customer-card:hover::after { opacity: 1; }
  .cust-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .cust-avatar { width: 48px; height: 48px; border-radius: 12px; background: linear-gradient(135deg, var(--gold-dim), rgba(201,168,76,0.05)); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: var(--gold); }
  .cust-actions { display: flex; gap: 6px; }
  .cust-name { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .cust-project { font-size: 13px; color: var(--gold); font-weight: 600; display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
  .cust-phone { font-size: 13px; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 5px; margin-bottom: 12px; direction: ltr; text-align: right; }
  .cust-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .meta-tag { background: var(--dark3); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 12px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
  .meta-tag.branches { border-color: rgba(76,175,122,0.3); color: var(--success); }
  .source-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .source-badge.facebook { background: rgba(24,119,242,0.15); color: #4A90E2; border: 1px solid rgba(74,144,226,0.3); }
  .source-badge.instagram { background: rgba(225,48,108,0.12); color: #E1306C; border: 1px solid rgba(225,48,108,0.3); }
  .source-badge.tiktok { background: rgba(120,120,120,0.2); color: #ccc; border: 1px solid rgba(200,200,200,0.2); }
  .source-badge.promoter { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid var(--border); }
  .branches-preview { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }
  .branch-item { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .branch-item::before { content: '📍'; font-size: 10px; }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 999; display: flex; align-items: center; justify-content: center; padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 620px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,0.8), var(--shadow-gold); transform: scale(0.96) translateY(16px); transition: transform 0.25s; }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-header { padding: 28px 28px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 20px; font-weight: 800; color: var(--gold-light); }
  .modal-header-actions { display: flex; gap: 8px; align-items: center; }
  .modal-close { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--dark3); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; }
  .modal-close:hover { border-color: var(--danger); color: var(--danger); }
  .modal-body { padding: 24px 28px 28px; }
  .detail-row { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid rgba(201,168,76,0.08); }
  .detail-row:last-child { border-bottom: none; }
  .detail-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .detail-content { flex: 1; }
  .detail-label { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .detail-value { font-size: 16px; font-weight: 600; color: var(--text); }

  /* ── Empty ── */
  .empty-state { text-align: center; padding: 80px 40px; }
  .empty-icon { font-size: 64px; margin-bottom: 20px; opacity: 0.4; }
  .empty-title { font-size: 18px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
  .empty-sub { font-size: 14px; color: var(--text-dim); }
  .no-results { color: var(--text-muted); text-align: center; padding: 40px; font-size: 15px; grid-column: 1/-1; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--dark3); border: 1px solid var(--gold); border-radius: 12px; padding: 14px 24px; font-size: 15px; font-weight: 600; color: var(--gold-light); box-shadow: var(--shadow-gold), var(--shadow); z-index: 9999; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); display: flex; align-items: center; gap: 10px; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

  @media (max-width: 700px) {
    .form-grid { grid-template-columns: 1fr; }
    .source-grid { grid-template-columns: repeat(2, 1fr); }
    .customers-grid { grid-template-columns: 1fr; }
    .header-stats { display: none; }
    .filter-select { width: 130px; }
    .list-toolbar { flex-direction: column; gap: 10px; align-items: flex-start; }
  }

  /* ════════════════════════════
     PRINT / PDF STYLES
  ════════════════════════════ */
  #print-target { display: none; }

  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body { background: #fff !important; color: #111 !important; }
    body::before { display: none !important; }
    header, .tabs, #panel-add, #panel-list, .modal-overlay, .toast { display: none !important; }
    #print-target { display: block !important; }

    .pdf-page {
      page-break-after: always; break-after: page;
      padding: 44px 48px; background: #fff;
      font-family: 'Tajawal', sans-serif; direction: rtl;
    }
    .pdf-page:last-child { page-break-after: avoid; break-after: avoid; }

    /* Header bar */
    .pdf-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 18px; margin-bottom: 28px;
      border-bottom: 3px solid #C9A84C;
    }
    .pdf-co-name { font-size: 24px; font-weight: 900; color: #111; }
    .pdf-co-sub { font-size: 12px; color: #999; margin-top: 3px; }
    .pdf-tag { background: #C9A84C; color: #fff; padding: 7px 18px; border-radius: 6px; font-size: 13px; font-weight: 800; }

    /* Avatar row */
    .pdf-hero { display: flex; align-items: center; gap: 22px; margin-bottom: 30px; }
    .pdf-av {
      width: 70px; height: 70px; border-radius: 14px;
      background: #fdf5e0; border: 2px solid #C9A84C;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 900; color: #C9A84C; flex-shrink: 0;
    }
    .pdf-cname { font-size: 26px; font-weight: 900; color: #111; }
    .pdf-cproj { font-size: 15px; color: #C9A84C; font-weight: 700; margin-top: 4px; }

    /* Info grid */
    .pdf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .pdf-cell {
      background: #fafaf8; border: 1px solid #e8e0cc;
      border-radius: 10px; padding: 14px 18px;
    }
    .pdf-cell.span2 { grid-column: 1 / -1; }
    .pdf-cell-lbl { font-size: 10px; font-weight: 800; color: #aaa; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; }
    .pdf-cell-val { font-size: 15px; font-weight: 700; color: #111; }

    /* Branches */
    .pdf-branch-list { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
    .pdf-branch-row { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #333; }
    .pdf-bnum { background: #C9A84C; color: #fff; width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; }

    /* Source pill */
    .pdf-pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; }
    .pdf-pill.facebook { background: #e8f0fd; color: #1877F2; border: 1px solid #bad2fb; }
    .pdf-pill.instagram { background: #fde8ef; color: #E1306C; border: 1px solid #fbb7ce; }
    .pdf-pill.tiktok { background: #f0f0f0; color: #333; border: 1px solid #ccc; }
    .pdf-pill.promoter { background: #fdf4e0; color: #8a6000; border: 1px solid #e8c97a; }

    /* Notes */
    .pdf-notes { background: #fdf9f0; border: 1px solid #e8d9a8; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #555; line-height: 1.8; margin-top: 6px; }

    /* Footer */
    .pdf-foot { margin-top: 36px; padding-top: 14px; border-top: 1px solid #e0d5b0; display: flex; justify-content: space-between; font-size: 11px; color: #bbb; }
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">🏢</div>
        <div class="logo-text">
          <h1>شركة كنز الماجد - نظام إدارة العملاء</h1>
          <p>تتبع بيانات عملائك بكل سهولة</p>
        </div>
      </div>
      <div class="header-stats">
        <div class="stat-chip"><div class="num" id="total-count">0</div><div class="lbl">إجمالي العملاء</div></div>
        <div class="stat-chip"><div class="num" id="branch-count">0</div><div class="lbl">إجمالي الفروع</div></div>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')"><span>➕</span> إضافة عميل</button>
    <button class="tab" onclick="switchTab('list')"><span>👥</span> قائمة العملاء</button>
  </div>

  <!-- ADD -->
  <div class="panel active" id="panel-add">
    <div class="card">
      <div class="card-title"><span>✍️</span> بيانات العميل الجديد</div>
      <div class="form-grid">

        <div class="form-group">
          <label>👤 اسم العميل *</label>
          <input type="text" id="cust-name" placeholder="أدخل اسم العميل">
        </div>

        <div class="form-group">
          <label>📁 اسم المشروع *</label>
          <input type="text" id="cust-project" placeholder="أدخل اسم المشروع">
        </div>

        <div class="form-group">
          <label>📞 رقم الهاتف</label>
          <input type="tel" id="cust-phone" placeholder="مثال: 0501234567" style="direction:ltr;text-align:right">
        </div>

        <div class="form-group full">
          <label>📍 الفروع ومواقعها</label>
          <div class="branch-list" id="branch-list">
            <div class="branch-row">
              <input type="text" placeholder="موقع الفرع الأول (مثال: الرياض - حي النزهة)">
              <button class="btn-icon" onclick="removeBranch(this)" title="حذف">✕</button>
            </div>
          </div>
          <button class="add-branch-btn" onclick="addBranch()">＋ إضافة فرع آخر</button>
        </div>

        <div class="form-group full">
          <label>📢 من أين عرف عنّا؟ *</label>
          <div class="source-grid">
            <div>
              <input type="radio" name="source" id="src-fb" value="facebook" class="source-option">
              <label for="src-fb" class="source-label"><span class="src-icon">📘</span><span class="src-name">فيسبوك</span></label>
            </div>
            <div>
              <input type="radio" name="source" id="src-ig" value="instagram" class="source-option">
              <label for="src-ig" class="source-label"><span class="src-icon">📸</span><span class="src-name">إنستقرام</span></label>
            </div>
            <div>
              <input type="radio" name="source" id="src-tt" value="tiktok" class="source-option">
              <label for="src-tt" class="source-label"><span class="src-icon">🎵</span><span class="src-name">تيك توك</span></label>
            </div>
            <div>
              <input type="radio" name="source" id="src-pr" value="promoter" class="source-option">
              <label for="src-pr" class="source-label"><span class="src-icon">🤝</span><span class="src-name">مروّج من الشركة</span></label>
            </div>
          </div>
        </div>

        <div class="form-group full">
          <label>📝 ملاحظات إضافية (اختياري)</label>
          <textarea id="cust-notes" placeholder="أي تفاصيل أو ملاحظات عن العميل..."></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-outline" onclick="clearForm()">🗑 مسح</button>
        <button class="btn btn-primary" onclick="saveCustomer()">💾 حفظ العميل</button>
      </div>
    </div>
  </div>

  <!-- LIST -->
  <div class="panel" id="panel-list">
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="ابحث باسم العميل أو المشروع أو رقم الهاتف..." oninput="renderCustomers()">
      </div>
      <select class="filter-select" id="source-filter" onchange="renderCustomers()">
        <option value="">كل المصادر</option>
        <option value="facebook">📘 فيسبوك</option>
        <option value="instagram">📸 إنستقرام</option>
        <option value="tiktok">🎵 تيك توك</option>
        <option value="promoter">🤝 مروّج</option>
      </select>
    </div>

    <div class="list-toolbar">
      <div class="list-count" id="list-count"></div>
      <button class="btn btn-pdf" onclick="printAllCustomers()">🖨️ طباعة جميع العملاء — PDF</button>
    </div>

    <div class="customers-grid" id="customers-grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-header-actions">
        <button class="btn btn-pdf" style="padding:8px 14px;font-size:13px" onclick="printSingleFromModal()">🖨️ طباعة PDF</button>
        <button class="modal-close" onclick="hideModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- PRINT ZONE -->
<div id="print-target"></div>

<div class="toast" id="toast"></div>

<script>
  let customers   = JSON.parse(localStorage.getItem('crm_customers') || '[]');
  let editingId   = null;
  let currentModalId = null;

  const sourceInfo = {
    facebook:  { icon: '📘', label: 'فيسبوك',          cls: 'facebook' },
    instagram: { icon: '📸', label: 'إنستقرام',        cls: 'instagram' },
    tiktok:    { icon: '🎵', label: 'تيك توك',         cls: 'tiktok' },
    promoter:  { icon: '🤝', label: 'مروّج من الشركة', cls: 'promoter' },
  };

  function save() { localStorage.setItem('crm_customers', JSON.stringify(customers)); updateStats(); }

  function updateStats() {
    document.getElementById('total-count').textContent  = customers.length;
    document.getElementById('branch-count').textContent = customers.reduce((s,c) => s + (c.branches?.length||0), 0);
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0)===(tab==='add')));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-'+tab).classList.add('active');
    if (tab==='list') renderCustomers();
  }

  function addBranch() {
    const list = document.getElementById('branch-list');
    const row  = document.createElement('div');
    row.className = 'branch-row';
    row.innerHTML = `<input type="text" placeholder="موقع الفرع (مثال: جدة - حي الروضة)">
                     <button class="btn-icon" onclick="removeBranch(this)">✕</button>`;
    list.appendChild(row);
    row.querySelector('input').focus();
  }

  function removeBranch(btn) {
    const list = document.getElementById('branch-list');
    if (list.children.length === 1) { showToast('⚠️ يجب أن يكون هناك فرع واحد على الأقل'); return; }
    btn.closest('.branch-row').remove();
  }

  function getBranches() {
    return [...document.querySelectorAll('#branch-list .branch-row input')].map(i=>i.value.trim()).filter(Boolean);
  }

  function setBranches(branches) {
    const list = document.getElementById('branch-list');
    list.innerHTML = '';
    (branches.length ? branches : ['']).forEach(b => {
      const row = document.createElement('div');
      row.className = 'branch-row';
      row.innerHTML = `<input type="text" placeholder="موقع الفرع" value="${escHtml(b)}">
                       <button class="btn-icon" onclick="removeBranch(this)">✕</button>`;
      list.appendChild(row);
    });
  }

  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function saveCustomer() {
    const name    = document.getElementById('cust-name').value.trim();
    const project = document.getElementById('cust-project').value.trim();
    const phone   = document.getElementById('cust-phone').value.trim();
    const branches= getBranches();
    const src     = document.querySelector('input[name="source"]:checked')?.value || '';
    const notes   = document.getElementById('cust-notes').value.trim();

    if (!name)    { showToast('⚠️ الرجاء إدخال اسم العميل');    return; }
    if (!project) { showToast('⚠️ الرجاء إدخال اسم المشروع');   return; }
    if (!src)     { showToast('⚠️ الرجاء اختيار مصدر المعرفة'); return; }

    const customer = {
      id: editingId || Date.now().toString(),
      name, project, phone, branches, source: src, notes,
      date: editingId
        ? (customers.find(c=>c.id===editingId)?.date || new Date().toLocaleDateString('ar-SA'))
        : new Date().toLocaleDateString('ar-SA')
    };

    if (editingId) { customers[customers.findIndex(c=>c.id===editingId)] = customer; editingId = null; }
    else           { customers.unshift(customer); }

    save(); clearForm(); showToast('✅ تم حفظ بيانات العميل بنجاح'); switchTab('list');
  }

  function clearForm() {
    ['cust-name','cust-project','cust-phone','cust-notes'].forEach(id => document.getElementById(id).value='');
    document.querySelectorAll('input[name="source"]').forEach(r=>r.checked=false);
    setBranches(['']); editingId = null;
  }

  function renderCustomers() {
    const q  = document.getElementById('search-input').value.toLowerCase();
    const sf = document.getElementById('source-filter').value;
    const grid = document.getElementById('customers-grid');

    const filtered = customers.filter(c => {
      const matchQ = !q || c.name.toLowerCase().includes(q) || c.project.toLowerCase().includes(q)
        || (c.phone||'').includes(q) || (c.branches||[]).some(b=>b.toLowerCase().includes(q));
      return matchQ && (!sf || c.source===sf);
    });

    document.getElementById('list-count').textContent =
      filtered.length ? `عرض ${filtered.length} من ${customers.length} عميل` : '';

    if (!filtered.length) {
      grid.innerHTML = customers.length===0
        ? `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📋</div><div class="empty-title">لا يوجد عملاء بعد</div><div class="empty-sub">ابدأ بإضافة عميلك الأول</div></div>`
        : `<div class="no-results">🔍 لا توجد نتائج مطابقة للبحث</div>`;
      return;
    }

    grid.innerHTML = filtered.map(c => {
      const si = sourceInfo[c.source]||{icon:'❓',label:'غير محدد',cls:''};
      const bc = (c.branches||[]).length;
      const bp = (c.branches||[]).slice(0,3).map(b=>`<div class="branch-item">${b}</div>`).join('');
      const bm = bc>3 ? `<div class="branch-item" style="color:var(--text-dim)">+${bc-3} فروع أخرى</div>` : '';

      return `<div class="customer-card" onclick="showDetail('${c.id}')">
        <div class="cust-header">
          <div class="cust-avatar">${c.name[0]}</div>
          <div class="cust-actions">
            <button class="btn-icon" onclick="printSingle(event,'${c.id}')" title="طباعة PDF" style="color:var(--success)">🖨️</button>
            <button class="btn-icon" onclick="editCustomer(event,'${c.id}')" title="تعديل">✏️</button>
            <button class="btn-icon" onclick="deleteCustomer(event,'${c.id}')" title="حذف">✕</button>
          </div>
        </div>
        <div class="cust-name">${c.name}</div>
        <div class="cust-project">📁 ${c.project}</div>
        ${c.phone?`<div class="cust-phone">📞 ${c.phone}</div>`:''}
        <div class="cust-meta">
          <div class="meta-tag branches">🌿 ${bc} فرع</div>
          <div class="meta-tag">📅 ${c.date}</div>
        </div>
        <span class="source-badge ${si.cls}">${si.icon} ${si.label}</span>
        ${bc?`<div class="branches-preview">${bp}${bm}</div>`:''}
      </div>`;
    }).join('');
  }

  function showDetail(id) {
    const c = customers.find(x=>x.id===id); if (!c) return;
    currentModalId = id;
    const si = sourceInfo[c.source]||{icon:'❓',label:'غير محدد',cls:''};
    const branches = (c.branches||[]).map((b,i)=>`<div class="branch-item">الفرع ${i+1}: ${b}</div>`).join('');
    document.getElementById('modal-title').textContent = c.name;
    document.getElementById('modal-body').innerHTML = `
      <div class="detail-row"><div class="detail-icon">👤</div><div class="detail-content"><div class="detail-label">اسم العميل</div><div class="detail-value">${c.name}</div></div></div>
      <div class="detail-row"><div class="detail-icon">📁</div><div class="detail-content"><div class="detail-label">اسم المشروع</div><div class="detail-value">${c.project}</div></div></div>
      ${c.phone?`<div class="detail-row"><div class="detail-icon">📞</div><div class="detail-content"><div class="detail-label">رقم الهاتف</div><div class="detail-value" style="direction:ltr;text-align:right">${c.phone}</div></div></div>`:''}
      <div class="detail-row"><div class="detail-icon">📍</div><div class="detail-content">
        <div class="detail-label">الفروع ومواقعها (${(c.branches||[]).length} فرع)</div>
        <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">${branches||'<span style="color:var(--text-dim);font-size:14px">لا توجد فروع</span>'}</div>
      </div></div>
      <div class="detail-row"><div class="detail-icon">${si.icon}</div><div class="detail-content"><div class="detail-label">مصدر المعرفة</div><div class="detail-value"><span class="source-badge ${si.cls}">${si.icon} ${si.label}</span></div></div></div>
      ${c.notes?`<div class="detail-row"><div class="detail-icon">📝</div><div class="detail-content"><div class="detail-label">ملاحظات</div><div class="detail-value" style="font-size:14px;line-height:1.7;color:var(--text-muted)">${c.notes}</div></div></div>`:''}
      <div class="detail-row"><div class="detail-icon">📅</div><div class="detail-content"><div class="detail-label">تاريخ الإضافة</div><div class="detail-value">${c.date}</div></div></div>
    `;
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal(e) { if (e.target===document.getElementById('modal-overlay')) hideModal(); }
  function hideModal()   { document.getElementById('modal-overlay').classList.remove('open'); currentModalId=null; }

  function editCustomer(e, id) {
    e.stopPropagation();
    const c = customers.find(x=>x.id===id); if (!c) return;
    editingId = id; switchTab('add');
    setTimeout(() => {
      document.getElementById('cust-name').value    = c.name;
      document.getElementById('cust-project').value = c.project;
      document.getElementById('cust-phone').value   = c.phone||'';
      document.getElementById('cust-notes').value   = c.notes||'';
      const m = {facebook:'fb',instagram:'ig',tiktok:'tt',promoter:'pr'};
      const r = document.getElementById('src-'+m[c.source]);
      if (r) r.checked = true;
      setBranches(c.branches?.length ? c.branches : ['']);
    }, 50);
  }

  function deleteCustomer(e, id) {
    e.stopPropagation();
    if (!confirm('هل أنت متأكد من حذف هذا العميل؟')) return;
    customers = customers.filter(c=>c.id!==id);
    save(); renderCustomers(); showToast('🗑 تم حذف العميل');
  }

  /* ═══════════════════════════════════
     PDF — build one page per customer
  ═══════════════════════════════════ */
  function buildPage(c) {
    const si = sourceInfo[c.source]||{icon:'❓',label:'غير محدد',cls:''};
    const bRows = (c.branches||[]).map((b,i)=>`
      <div class="pdf-branch-row">
        <div class="pdf-bnum">${i+1}</div>
        <span>${b}</span>
      </div>`).join('');

    return `<div class="pdf-page">

      <div class="pdf-topbar">
        <div>
          <div class="pdf-co-name">🏢 شركة كنز الماجد - نظام إدارة العملاء</div>
          <div class="pdf-co-sub">ملف العميل — تاريخ الطباعة: ${new Date().toLocaleDateString('ar-SA')}</div>
        </div>
        <div class="pdf-tag">بيانات عميل</div>
      </div>

      <div class="pdf-hero">
        <div class="pdf-av">${c.name[0]}</div>
        <div>
          <div class="pdf-cname">${c.name}</div>
          <div class="pdf-cproj">📁 ${c.project}</div>
        </div>
      </div>

      <div class="pdf-grid">
        ${c.phone?`
        <div class="pdf-cell">
          <div class="pdf-cell-lbl">📞 رقم الهاتف</div>
          <div class="pdf-cell-val" style="direction:ltr;text-align:right">${c.phone}</div>
        </div>`:''}

        <div class="pdf-cell">
          <div class="pdf-cell-lbl">📅 تاريخ الإضافة</div>
          <div class="pdf-cell-val">${c.date}</div>
        </div>

        <div class="pdf-cell ${c.phone?'':'span2'}">
          <div class="pdf-cell-lbl">📢 مصدر المعرفة</div>
          <div class="pdf-cell-val"><span class="pdf-pill ${si.cls}">${si.icon} ${si.label}</span></div>
        </div>

        <div class="pdf-cell span2">
          <div class="pdf-cell-lbl">📍 الفروع ومواقعها — ${(c.branches||[]).length} فرع</div>
          <div class="pdf-branch-list">
            ${bRows||'<span style="color:#aaa;font-size:13px">لا توجد فروع مسجلة</span>'}
          </div>
        </div>

        ${c.notes?`
        <div class="pdf-cell span2">
          <div class="pdf-cell-lbl">📝 ملاحظات</div>
          <div class="pdf-notes">${c.notes}</div>
        </div>`:''}
      </div>

      <div class="pdf-foot">
        <span>نظام إدارة العملاء</span>
        <span>رقم العميل: #${c.id.slice(-6)}</span>
      </div>
    </div>`;
  }

  function doPrint(html) {
    document.getElementById('print-target').innerHTML = html;
    setTimeout(() => window.print(), 350);
  }

  function printSingle(e, id) {
    e.stopPropagation();
    const c = customers.find(x=>x.id===id);
    if (c) doPrint(buildPage(c));
  }

  function printSingleFromModal() {
    const c = customers.find(x=>x.id===currentModalId);
    if (c) doPrint(buildPage(c));
  }

  function printAllCustomers() {
    if (!customers.length) { showToast('⚠️ لا يوجد عملاء للطباعة'); return; }
    doPrint(customers.map(buildPage).join(''));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 3000);
  }

  updateStats();
</script>
</body>
</html>
